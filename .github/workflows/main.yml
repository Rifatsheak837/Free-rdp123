name: 🚀 SEVER AI STV PREMIUM

on:
  workflow_dispatch:
    inputs:
      duration:
        description: '🕐 Session duration'
        required: false
        default: '5h40m'
        type: choice
        options:
        - '1h'
        - '3h' 
        - '5h40m'

jobs:
  Premium-RDP-Setup:
    runs-on: windows-latest
    timeout-minutes: 340
    
    steps:
      - name: 🎯 SYSTEM STARTUP
        run: |
          Write-Host "🤖 AI STV PREMIUM RDP SERVER" -ForegroundColor Yellow
          Write-Host "⚡ Powered by AI STV" -ForegroundColor Green
          Write-Host "🕒 Duration: ${{ github.event.inputs.duration }}" -ForegroundColor Magenta
          $frames = @('⣾', '⣽', '⣻', '⢿', '⡿', '⣟', '⣯', '⣷')
          for($i=0; $i -lt 10; $i++) {
              Write-Host "`r🚀 Initializing... $($frames[$i % 8])" -NoNewline -ForegroundColor Blue
              Start-Sleep -Milliseconds 100
          }
          Write-Host "`r✅ System ready!                    " -ForegroundColor Green

      - name: 🔧 SYSTEM CONFIGURATION
        run: |
          Write-Host "🛠️  CONFIGURING SYSTEM" -ForegroundColor Yellow
          $steps = @(
              @{Name="Enable Remote Desktop"; Script={ 
                  Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
              }},
              @{Name="Disable NLA"; Script={
                  Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
                  Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
              }},
              @{Name="Open port 3389 in firewall"; Script={
                  netsh advfirewall firewall add rule name="RDP-Premium" dir=in action=allow protocol=TCP localport=3389 profile=any
                  netsh advfirewall firewall add rule name="RDP-Premium-Out" dir=out action=allow protocol=TCP localport=3389 profile=any
              }},
              @{Name="Start RDP services"; Script={
                  Set-Service -Name TermService -StartupType Automatic -ErrorAction SilentlyContinue
                  Set-Service -Name UmRdpService -StartupType Automatic -ErrorAction SilentlyContinue
                  Start-Service -Name TermService -ErrorAction SilentlyContinue
                  Start-Service -Name UmRdpService -ErrorAction SilentlyContinue
              }}
          )
          foreach($step in $steps) {
              Write-Host "│ 📋 $($step.Name)..." -NoNewline -ForegroundColor White
              try {
                  & $step.Script
                  Write-Host "`r│ ✅ $($step.Name)" -ForegroundColor Green
              } catch {
                  Write-Host "`r│ ⚠️  $($step.Name) - Minor error skipped" -ForegroundColor Yellow
              }
              Start-Sleep -Milliseconds 300
          }
          Write-Host "🎯 Configuration complete!" -ForegroundColor Green

      - name: 👤 CREATE PREMIUM ACCOUNT
        run: |
          Write-Host "👤 CREATING PREMIUM ACCOUNT" -ForegroundColor Yellow

          $username = "free-rdp123"
          $password = "free-rdp123"
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force

          # Remove old user if exists
          try {
              Remove-LocalUser -Name $username -ErrorAction SilentlyContinue
              Write-Host "│ ✅ Removed old user" -ForegroundColor Green
          } catch {
              Write-Host "│ ℹ️  No old user to remove" -ForegroundColor Blue
          }

          # Create user
          try {
              New-LocalUser -Name $username -Password $securePass -AccountNeverExpires -Description "AI STV Premium Account"
              Set-LocalUser -Name $username -PasswordNeverExpires $true -ErrorAction SilentlyContinue
              Add-LocalGroupMember -Group "Administrators"       -Member $username -ErrorAction SilentlyContinue
              Add-LocalGroupMember -Group "Remote Desktop Users" -Member $username -ErrorAction SilentlyContinue
              Add-LocalGroupMember -Group "Users"               -Member $username -ErrorAction SilentlyContinue
              Enable-LocalUser -Name $username
              Write-Host "│ ✅ User '$username' created with Administrator & RDP permissions" -ForegroundColor Green
          } catch {
              Write-Host "│ ❌ Error: $($_.Exception.Message)" -ForegroundColor Red
              exit 1
          }

          echo "RDP_USER=$username" >> $env:GITHUB_ENV
          echo "RDP_PASS=$password" >> $env:GITHUB_ENV
          Write-Host "✅ Account ready!" -ForegroundColor Green

      - name: 🔍 SYSTEM PERMISSION CHECK
        run: |
          Write-Host "🔍 CHECKING LOGIN PERMISSIONS" -ForegroundColor Yellow
          $username = "free-rdp123"

          $user = Get-LocalUser -Name $username -ErrorAction SilentlyContinue
          if ($user) {
              Write-Host "│ ✅ User '$username' exists | Enabled: $($user.Enabled)" -ForegroundColor Green
          } else {
              Write-Host "│ ❌ User not found" -ForegroundColor Red; exit 1
          }

          $isAdmin = (Get-LocalGroupMember -Group "Administrators" | Where-Object {$_.Name -like "*$username"}).Count -gt 0
          Write-Host "│ $(if($isAdmin){'✅'}else{'❌'}) Administrator permissions: $isAdmin" -ForegroundColor $(if($isAdmin){'Green'}else{'Red'})

          $isRDP = (Get-LocalGroupMember -Group "Remote Desktop Users" | Where-Object {$_.Name -like "*$username"}).Count -gt 0
          Write-Host "│ $(if($isRDP){'✅'}else{'❌'}) Remote Desktop permissions: $isRDP" -ForegroundColor $(if($isRDP){'Green'}else{'Red'})

          $svc = Get-Service -Name TermService -ErrorAction SilentlyContinue
          Write-Host "│ $(if($svc.Status -eq 'Running'){'✅'}else{'❌'}) TermService: $($svc.Status)" -ForegroundColor $(if($svc.Status -eq 'Running'){'Green'}else{'Red'})
          Write-Host "🎯 Check complete!" -ForegroundColor Green

      - name: 🌐 PREMIUM NETWORK SETUP
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          Write-Host "🌐 SETTING UP NETWORK CONNECTION" -ForegroundColor Yellow

          try {
              $msi = "$env:TEMP\tailscale.msi"
              Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile $msi
              Start-Process msiexec.exe -ArgumentList "/i `"$msi`" /quiet /norestart" -Wait
              Remove-Item $msi -Force -ErrorAction SilentlyContinue
              Write-Host "│ ✅ Tailscale installed" -ForegroundColor Green
          } catch {
              Write-Host "│ ❌ Tailscale install failed" -ForegroundColor Red
          }

          Start-Sleep -Seconds 10

          try {
              & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=$env:TAILSCALE_AUTH_KEY --hostname=ai-stv-$env:GITHUB_RUN_ID --accept-routes --accept-dns --reset
              Write-Host "│ ✅ Tailscale connected" -ForegroundColor Green
          } catch {
              Write-Host "│ ❌ Tailscale connection failed" -ForegroundColor Red
          }

          $ip = $null
          for($i=0; $i -lt 20; $i++) {
              try {
                  $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4 2>&1
                  if ($ip -match '^\d+\.\d+\.\d+\.\d+$') {
                      echo "TAILSCALE_IP=$ip" >> $env:GITHUB_ENV
                      Write-Host "✅ Tailscale IP: $ip" -ForegroundColor Green
                      break
                  }
              } catch {}
              Start-Sleep -Seconds 3
          }
          if (-not $ip -or $ip -notmatch '^\d+\.\d+\.\d+\.\d+$') {
              Write-Host "⚠️  Could not get IP, defaulting to localhost" -ForegroundColor Yellow
              echo "TAILSCALE_IP=localhost" >> $env:GITHUB_ENV
          }

      - name: 🎉 CONNECTION INFORMATION
        run: |
          $username = "free-rdp123"
          $password = "free-rdp123"

          $durationInput = "${{ github.event.inputs.duration }}"
          switch ($durationInput) {
              "1h"    { $totalMinutes = 60;  $displayTime = "1 hour" }
              "3h"    { $totalMinutes = 180; $displayTime = "3 hours" }
              "5h40m" { $totalMinutes = 340; $displayTime = "5 hours 40 minutes" }
          }

          $tz        = [System.TimeZoneInfo]::FindSystemTimeZoneById("SE Asia Standard Time")
          $startTime = [System.TimeZoneInfo]::ConvertTimeFromUtc((Get-Date).ToUniversalTime(), $tz)
          $endTime   = $startTime.AddMinutes($totalMinutes)

          Write-Host ""
          Write-Host "┌──────────────────────────────────────────────┐" -ForegroundColor Cyan
          Write-Host "│          🎉 CONNECTION READY!                 │" -ForegroundColor Cyan
          Write-Host "├──────────────────────────────────────────────┤" -ForegroundColor Cyan
          Write-Host "│ 🌐  Address  : $env:TAILSCALE_IP" -ForegroundColor White
          Write-Host "│ 👤  Username : $username" -ForegroundColor White
          Write-Host "│ 🔐  Password : $password" -ForegroundColor White
          Write-Host "│ 📍  Port     : 3389" -ForegroundColor White
          Write-Host "│ ⏰  Duration : $displayTime" -ForegroundColor White
          Write-Host "│ 🕐  Start    : $($startTime.ToString('HH:mm:ss'))" -ForegroundColor White
          Write-Host "│ 🕐  End      : $($endTime.ToString('HH:mm:ss'))" -ForegroundColor White
          Write-Host "├──────────────────────────────────────────────┤" -ForegroundColor Cyan
          Write-Host "│ 💡 Open Remote Desktop → $env:TAILSCALE_IP  │" -ForegroundColor Yellow
          Write-Host "└──────────────────────────────────────────────┘" -ForegroundColor Cyan

          echo "TOTAL_MINUTES=$totalMinutes" >> $env:GITHUB_ENV

      - name: ⏳ MAINTAINING SESSION
        run: |
          $totalMinutes = $env:TOTAL_MINUTES
          $tz        = [System.TimeZoneInfo]::FindSystemTimeZoneById("SE Asia Standard Time")
          $startTime = [System.TimeZoneInfo]::ConvertTimeFromUtc((Get-Date).ToUniversalTime(), $tz)
          $endTime   = $startTime.AddMinutes($totalMinutes)

          Write-Host "🔄 Session active until $($endTime.ToString('HH:mm:ss'))" -ForegroundColor Green

          # Background monitor
          Start-Job -Name "Monitor" -ScriptBlock {
              while ($true) {
                  $svc = Get-Service -Name TermService -ErrorAction SilentlyContinue
                  if ($svc.Status -ne 'Running') {
                      Start-Service TermService -ErrorAction SilentlyContinue
                  }
                  Start-Sleep -Seconds 30
              }
          } | Out-Null

          $frames = @('⠋','⠙','⠹','⠸','⠼','⠴','⠦','⠧','⠇','⠏')
          $tick   = 0
          do {
              $now       = [System.TimeZoneInfo]::ConvertTimeFromUtc((Get-Date).ToUniversalTime(), $tz)
              $remaining = $endTime - $now
              $h = [math]::Max(0,[math]::Floor($remaining.TotalHours))
              $m = [math]::Max(0,[math]::Floor($remaining.TotalMinutes % 60))
              $s = [math]::Max(0,[math]::Floor($remaining.TotalSeconds % 60))
              Write-Host "`r$($frames[$tick % 10]) [$($now.ToString('HH:mm:ss'))] Remaining: ${h}h ${m}m ${s}s   " -NoNewline -ForegroundColor Cyan
              $tick++
              Start-Sleep -Seconds 5
          } while ($remaining.TotalSeconds -gt 0)

          Write-Host "`n🎯 Session expired." -ForegroundColor Red
          Get-Job -Name "Monitor" -ErrorAction SilentlyContinue | Stop-Job -PassThru | Remove-Job -Force

      - name: 🧹 SYSTEM CLEANUP
        if: always()
        run: |
          Write-Host "🧹 CLEANING UP..." -ForegroundColor Yellow
          $username = "free-rdp123"

          $cleanupSteps = @(
              @{Name="Disable user";           Script={ Disable-LocalUser -Name $username -ErrorAction SilentlyContinue }},
              @{Name="Disconnect Tailscale";   Script={ & "$env:ProgramFiles\Tailscale\tailscale.exe" down --accept-risk=all 2>$null; Start-Sleep 3 }},
              @{Name="Remove firewall rules";  Script={
                  netsh advfirewall firewall delete rule name="RDP-Premium" 2>$null
                  netsh advfirewall firewall delete rule name="RDP-Premium-Out" 2>$null
              }},
              @{Name="Restore RDP settings";   Script={
                  Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 1 -Force -ErrorAction SilentlyContinue
                  Stop-Service -Name TermService -Force -ErrorAction SilentlyContinue
              }}
          )

          foreach($step in $cleanupSteps) {
              Write-Host "│ 🗑️  $($step.Name)..." -NoNewline -ForegroundColor Gray
              try {
                  & $step.Script
                  Write-Host "`r│ ✅ $($step.Name)" -ForegroundColor Green
              } catch {
                  Write-Host "`r│ ⚠️  $($step.Name) - Handled" -ForegroundColor Yellow
              }
          }

          Get-Job | Stop-Job -PassThru | Remove-Job -Force -ErrorAction SilentlyContinue
          Write-Host "✅ Cleanup done. Goodbye! 👋" -ForegroundColor Green
